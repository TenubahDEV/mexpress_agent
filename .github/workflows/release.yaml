name: Release Tenubah Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Linux binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X github.com/TenubahDEV/mexpress_agent/internal/version.Version=${VERSION}" \
            -o dist/tenubah-agent-linux-amd64 ./cmd/tenubah-agent

      - name: Build Windows binary
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-s -w -X github.com/TenubahDEV/mexpress_agent/internal/version.Version=${VERSION}" \
            -o dist/tenubah-agent-windows-amd64.exe ./cmd/tenubah-agent

      - name: Write signing key
        run: |
          echo "${{ secrets.TENUBAH_SIGNING_KEY }}" > signing_key.pem

      - name: Sign binaries
        run: |
          openssl dgst -sha256 -sign signing_key.pem \
            dist/tenubah-agent-linux-amd64 > dist/tenubah-agent-linux-amd64.sig

          openssl dgst -sha256 -sign signing_key.pem \
            dist/tenubah-agent-windows-amd64.exe > dist/tenubah-agent-windows-amd64.exe.sig

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tenubah-agent-linux-amd64
            dist/tenubah-agent-linux-amd64.sig
            dist/tenubah-agent-windows-amd64.exe
            dist/tenubah-agent-windows-amd64.exe.sig

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload binaries to S3
        run: |
          CLIENT="${{ secrets.TENUBAH_CLIENT }}"

          aws s3 cp dist/tenubah-agent-linux-amd64 \
            s3://tenubah-install/${CLIENT}/bin/tenubah-agent-linux-amd64

          aws s3 cp dist/tenubah-agent-linux-amd64.sig \
            s3://tenubah-install/${CLIENT}/bin/tenubah-agent-linux-amd64.sig

          aws s3 cp dist/tenubah-agent-windows-amd64.exe \
            s3://tenubah-install/${CLIENT}/bin/tenubah-agent-windows-amd64.exe

          aws s3 cp dist/tenubah-agent-windows-amd64.exe.sig \
            s3://tenubah-install/${CLIENT}/bin/tenubah-agent-windows-amd64.exe.sig

          # Subir los instaladores de Linux y Windows a sus respectivas carpetas
          aws s3 cp packaging/linux/install.sh \
            s3://tenubah-install/${CLIENT}/linux/install.sh

          aws s3 cp packaging/windows/install.ps1 \
            s3://tenubah-install/${CLIENT}/windows/install.ps1
