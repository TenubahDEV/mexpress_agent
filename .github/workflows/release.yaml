name: Release Tenubah Agent

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.22"

            - name: Build Linux amd64
              run: |
                  GOOS=linux GOARCH=amd64 go build \
                    -ldflags "-s -w -X github.com/TenubahDEV/tenubah-agent/internal/version.Version=${{ github.ref_name }}" \
                    -o dist/tenubah-agent-linux-amd64 \
                    ./cmd/tenubah-agent

            - name: Build Windows amd64
              run: |
                  GOOS=windows GOARCH=amd64 go build \
                    -ldflags "-s -w -X github.com/TenubahDEV/tenubah-agent/internal/version.Version=${{ github.ref_name }}" \
                    -o dist/tenubah-agent-windows-amd64.exe \
                    ./cmd/tenubah-agent

            - name: Write signing key
              run: |
                  echo "${{ secrets.TENUBAH_SIGNING_KEY }}" > signing_key.pem

            - name: Sign Linux binary
              run: |
                  openssl dgst -sha256 -sign signing_key.pem \
                    dist/tenubah-agent-linux-amd64 \
                    > dist/tenubah-agent-linux-amd64.sig

            - name: Sign Windows binary
              run: |
                  openssl dgst -sha256 -sign signing_key.pem \
                    dist/tenubah-agent-windows-amd64.exe \
                    > dist/tenubah-agent-windows-amd64.exe.sig

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/tenubah-agent-linux-amd64
                      dist/tenubah-agent-linux-amd64.sig
                      dist/tenubah-agent-windows-amd64.exe
                      dist/tenubah-agent-windows-amd64.exe.sig
