job_name: "mexpress_agent"
instance_name: ""
pushgateway_url: "https://push.mexpress.tenubah.com"
interval_seconds: 60

# Usa TOKEN o bien USERNAME/PASSWORD para autenticación
token: ""
username: "mexpress"
password: "REPLACE_WITH_YOUR_BASIC_AUTH_PASSWORD"

labels:
  customer: "mexpress"
  env: "prod"

# Monitoreo de Bases de Datos (Opcional - Deshabilitado por defecto)
database_monitoring:
  enabled: false
  type: "sqlserver"
  connection_string: "sqlserver://sa:TuPasswordSeguro@localhost:1433?database=master"
  collect_interval_seconds: 60
